<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Prenda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-warning text-dark text-center">
          <h4>✏️ Editar Prenda: {{ prenda.nombre }}</h4>
        </div>
        <div class="card-body p-4">
          <form action="/editar/{{ prenda.id }}" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
              <label class="form-label fw-bold">Nombre de la prenda</label>
              <input type="text" name="nombre" class="form-control" value="{{ prenda.nombre }}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Descripción</label>
              <textarea name="descripcion" class="form-control" rows="3" required>{{ prenda.descripcion }}</textarea>
            </div>

            <div class="row">
              <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Talla</label>
                <select name="talla" class="form-select" required>
                  <option value="XS" {% if prenda.talla == 'XS' %}selected{% endif %}>XS</option>
                  <option value="S" {% if prenda.talla == 'S' %}selected{% endif %}>S</option>
                  <option value="M" {% if prenda.talla == 'M' %}selected{% endif %}>M</option>
                  <option value="L" {% if prenda.talla == 'L' %}selected{% endif %}>L</option>
                  <option value="XL" {% if prenda.talla == 'XL' %}selected{% endif %}>XL</option>
                </select>
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Color</label>
                <input type="text" name="color" class="form-control" value="{{ prenda.color }}" required>
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Precio (USD)</label>
                <input type="number" step="1" name="precio" class="form-control" value="{{ prenda.precio | int }}" required>
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Stock</label>
                <input type="number" step="1" name="stock" class="form-control" value="{{ prenda.stock }}" required min="0">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Fotografía (Opcional)</label>
              <p class="text-muted small mb-2">Imagen actual: <strong>{{ prenda.imagen }}</strong>. Sube una nueva solo si deseas reemplazarla.</p>
              <input type="file" name="imagen" class="form-control" accept=".jpg, .jpeg, .png">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-warning">💾 Guardar Cambios</button>
              <a href="/inventario" class="btn btn-outline-secondary">Cancelar y volver al inventario</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
