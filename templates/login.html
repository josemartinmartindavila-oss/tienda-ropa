<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Mi Tienda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">👕 Mi Tienda</a>
    <div class="d-flex align-items-center">
      <a href="/registro" class="btn btn-primary shadow-sm">Registrarse</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-dark text-white text-center p-4">
          <h4 class="mb-0">🔑 Acceso al Sistema</h4>
        </div>
        <div class="card-body p-5">

          {% with messages = get_flashed_messages() %}
          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-danger text-center shadow-sm fw-bold">{{ message }}</div>
          {% endfor %}
          {% endif %}
          {% endwith %}

          <form action="/login" method="POST">
            <div class="mb-3">
              <label class="form-label fw-bold">Correo electrónico</label>
              <input type="email" name="correo" class="form-control bg-light border-secondary" required autofocus>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Contraseña</label>
              <input type="password" name="password" class="form-control bg-light border-secondary" required>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-dark btn-lg shadow">Entrar</button>

              <div class="mt-4 text-center">
                <a href="/registro" class="text-decoration-none fw-bold text-primary">¿No tienes cuenta? Regístrate aquí</a>
                <br>
                <a href="/" class="text-decoration-none text-muted small mt-3 d-inline-block">⬅ Volver al catálogo</a>
              </div>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
